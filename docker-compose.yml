version: "3.8"

services:
  backend: 
    image: ${DOCKERHUB_USERNAME}/rag-pdf-backend:${IMAGE_TAG:-latest}
    container_name: rag-backend
    ports:
      -"8000:8000"
    env_file:
      - .env
    restart: unless-stoped
    networks:
      - rag-net

  frontend:
    image: ${DOCKERHUB_USERNAME}/rag-pdf-frontend:${IMAGE_TAG:-latest}
    container_name: rag-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://192.168.116.110:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - rag-net
 
networks:
  rag-net:
    driver: bridge